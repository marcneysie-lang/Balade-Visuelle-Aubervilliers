<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carte de la Balade</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.7.1/dist/leaflet.css" />
    <link rel="stylesheet" href="styles.css"> 
</head>
<body>

    <nav class="main-nav">
        <a href="index.html">Timeline</a>
        <a href="carte.html" class="active">Carte</a>
        <a href="graphique.html">Statistiques</a>
    </nav>

    <div class="visual-container">
        <h1 class="page-title">🌍 Cartographie de la balade</h1>
        <div id="map"></div>
    </div>

    <script src="https://unpkg.com/leaflet@1.7.1/dist/leaflet.js"></script>
    <script>
        var map = L.map('map').setView([48.908, 2.370], 15);

        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
            attribution: '© OpenStreetMap & CARTO'
        }).addTo(map);

        // VOS DONNÉES 
        var points = [
            [48.91167, 2.36704, 'photo1.jpg', 'Départ : Campus Condorcet'],
            [48.91145, 2.36667, 'photo2.jpg', 'Devant l\'Humathèque'],
            [48.91146, 2.36669, 'photo3.jpg', 'intérieur l\'Humathèque'],
            [48.90676, 2.36589, 'photo4.jpg', 'Centre des Colloques'],
            [48.90682, 2.36619, 'photo5.jpg', 'Le batiment TSF'],
            [48.90683, 2.36609, 'photo6.jpg', 'Le Pole socio médical'],
            [48.90666, 2.36615, 'photo7.jpg', 'Maison des Sciences de l\'Homme'],
            [48.90670, 2.36622, 'photo8.jpg', 'Bar'],
            [48.90659, 2.36630, 'photo9.jpg', 'Commerces'],
            [48.90660, 2.36648, 'photo10.jpg', 'Franprix'],
            [48.90671, 2.36685, 'photo11.jpg', 'Pharmacie'],
            [48.90636, 2.36640, 'photo12.jpg', 'Parc de la place'],
            [48.90624, 2.36653, 'photo13.jpg', 'Restaurant sur la place'],
            [48.90616, 2.36656, 'photo14.jpg', 'Fast food sur la place'],
            [48.90614, 2.36655, 'photo15.jpg', 'Des gens qui circulent sur la place'],
            [48.90632, 2.36645, 'photo16.jpg', 'Affichage sur la ville'],
            [48.90627, 2.36633, 'photo17.jpg', 'Logement des habitants'],
            [48.90629, 2.36629, 'photo18.jpg', 'Tour emblématique d\'Aubervilliers'],
            [48.90626, 2.36623, 'photo19.jpg', 'Achat et vente de maison'],
            [48.90598, 2.36663, 'photo20.jpg', 'Studio Central'],
            [48.90599, 2.36664, 'photo21.jpg', 'Tableau'],
            [48.90537, 2.36787, 'photo22.jpg', 'Studio 217 Star Academy'],
            [48.90542, 2.36789, 'photo23.jpg', 'Michel friperie'],
            [48.90412, 2.36792, 'photo24.jpg', 'Affiche du studio 210'],
            [48.90417, 2.36748, 'photo25.jpg', 'Terrain de jeu'],
            [48.90383, 2.36769, 'photo26.jpg', 'Parc urbain, Zone de fauve tardive'],
            [48.90385, 2.36767, 'photo27.jpg', 'Le passage'],
            [48.90781, 2.36801, 'photo28.jpg', 'Bureaux à louer'],
            [48.90823, 2.36898, 'photo29.jpg', 'Grossiste bijoutier'],
            [48.90969, 2.37196, 'photo30.jpg', 'Collège Miriam Makeba'],
            [48.91059, 2.37205, 'photo31.jpg', 'Kebab'],
            [48.91102, 2.37312, 'photo32.jpg', 'Vélos électriques à louer'],
            [48.91217, 2.37456, 'photo33.jpg', 'Cours d'eau'],
            [48.91345, 2.37596, 'photo34.jpg', 'Terideal bureaux de location'],
            [48.91476, 2.37635, 'photo35.jpg', 'Ferme Urbaine']
        ];

        points.forEach(function(point) {
            var lat = point[0];
            var lon = point[1];
            var fileName = point[2];
            var title = point[3];

            var marker = L.marker([lat, lon]).addTo(map);
            
            // Popup
            marker.bindPopup("<b>" + title + "</b><br><img src='images/" + fileName + "' class='popup-img'>");

            // Centrage intelligent (décalage vers le haut)
            marker.on('click', function() {
                var pixelPosition = map.project([lat, lon], map.getZoom());
                pixelPosition.y -= 150; 
                var newCenter = map.unproject(pixelPosition, map.getZoom());
                map.setView(newCenter, map.getZoom(), {animate: true});
            });
        });
    </script>
</body>
</html>
