<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carte de la Balade</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.7.1/dist/leaflet.css" />
    <link rel="stylesheet" href="styles.css"> 
</head>
<body>

    <nav class="main-nav">
        <a href="index.html">Timeline</a>
        <a href="carte.html" class="active">Carte</a>
        <a href="graphique.html">Statistiques</a>
    </nav>

    <div class="visual-container">
        <h1 class="page-title">🌍 Le Parcours en Images</h1>
        <div id="map"></div>
    </div>

    <script src="https://unpkg.com/leaflet@1.7.1/dist/leaflet.js"></script>
    <script>
        var map = L.map('map').setView([48.908, 2.370], 15);

        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
            attribution: '© OpenStreetMap & CARTO'
        }).addTo(map);

        // VOS DONNÉES 
        var points = [
            [48.91167, 2.36704, 'photo-01-campuscondorcet.jpg', 'Départ : Campus Condorcet'],
            [48.91145, 2.36667, 'photo-02-humatheque.jpg', 'Devant l\'Humathèque'],
            [48.91146, 2.36669, 'photo-03-humathèque.jpg', 'intérieur l\'Humathèque'],
            [48.90676, 2.36589, 'photo-04-campuscondorcetsud.jpg', 'Centre des Colloques'],
            [48.90682, 2.36619, 'photo-05-TSF.jpg', 'Le batiment TSF'],
            [48.90683, 2.36609, 'photo-06-polesociomedical.jpg', 'Le Pole socio médical'],
            [48.90666, 2.36615, 'photo-07-MSHParis.jpg', 'Maison des Sciences de l\'Homme'],
            [48.90670, 2.36622, 'photo-08-bar.jpg', 'Bar'],
            [48.90659, 2.36630, 'photo-09-boulanger-salon.jpg', 'Commerces'],
            [48.90660, 2.36648, 'photo-10-franprix.jpg', 'Franprix'],
            [48.90671, 2.36685, 'photo-11-pharmacie.jpg', 'Pharmacie'],
            [48.90636, 2.36640, 'photo-12-parc.jpg', 'Parc de la place'],
            [48.90624, 2.36653, 'photo-13-restaurant.jpg', 'Restaurant sur la place'],
            [48.90616, 2.36656, 'photo-14-pizza.jpg', 'Fast food sur la place'],
            [48.90614, 2.36655, 'photo-15-passants.jpg', 'Des gens qui circulent sur la place'],
            [48.90632, 2.36645,'photo-16-affichage.jpg', 'Affichage sur la ville'],
            [48.90627, 2.36633, 'photo-17-batiment.jpg', 'Logement des habitants'],
            [48.90629, 2.36629, 'photo-18-tour.jpg', 'Tour emblématique d\'Aubervilliers'],
            [48.90626, 2.36623, 'photo-19-immobilliers.jpg', 'Achat et vente de maison'],
            [48.90598, 2.36663, 'photo-20-studiocentral.jpg', 'Studio Central'],
            [48.90599, 2.36664, 'photo-21-tableau.jpg', 'Tableau d'affichage'],
            [48.90537, 2.36787, 'photo-22-studio217.jpg', 'Studio 217 Star Academy'],
            [48.90542, 2.36789, 'photo-23-Michel.jpg', 'Michel friperie'],
            [48.90412, 2.36792, 'photo-24-210.jpg', 'Affiche du studio 210'],
            [48.90417, 2.36748, 'photo-25-terraindejeu.jpg', 'Terrain de jeu'],
            [48.90383, 2.36769, 'photo-26-zonedefauvetardive.jpg', 'Parc urbain, Zone de fauve tardive'],
            [48.90385, 2.36767, 'photo-27-lepassage.jpg', 'Le passage'],
            [48.90781, 2.36801, 'photo-28-bureauxàlouer.jpg', 'Bureaux à louer'],
            [48.90823, 2.36898, 'photo-29-grossistes.jpg', 'Grossiste bijoutier'],
            [48.90969, 2.37196, 'photo-30-CollègeMiriamMakeba.jpg', 'Collège Miriam Makeba'],
            [48.91059, 2.37205, 'photo-31-Kebab.jpg', 'Kebab']
            [48.91102, 2.37312, 'photo-32-véloélectrique.jpg', 'Vélos électriques à louer'],
            [48.91217, 2.37456, 'photo-33-coursd'eau.jpg', 'Cours d'eau'],
            [48.91345, 2.37596, 'photo-34-Terideal.jpg', 'Terideal bureaux de location'],
            [48.91476, 2.37635, 'photo-35-fermeurbaine.jpg', 'Ferme Urbaine']
        ];

        points.forEach(function(point) {
            var lat = point[0];
            var lon = point[1];
            var fileName = point[2];
            var title = point[3];

            var marker = L.marker([lat, lon]).addTo(map);
            
            // Popup
            marker.bindPopup("<b>" + title + "</b><br><img src='images/" + fileName + "' class='popup-img'>");

            // Centrage intelligent (décalage vers le haut)
            marker.on('click', function() {
                var pixelPosition = map.project([lat, lon], map.getZoom());
                pixelPosition.y -= 150; 
                var newCenter = map.unproject(pixelPosition, map.getZoom());
                map.setView(newCenter, map.getZoom(), {animate: true});
            });
        });
    </script>
</body>
</html>
