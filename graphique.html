<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Statistiques de la Balade</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <nav class="main-nav">
        <a href="index.html">Timeline</a>
        <a href="carte.html">Carte</a>
        <a href="graphique.html" class="active">Statistiques</a>

    <div class="visual-container">
        <h2 class="page-title">📷 Visualisation graphique de la balade</h2>
        
        <div class="chart-wrapper">
            <div class="bar-group"><span class="count">3</span><div class="bar" style="height: 18%; background-color: #4CAF50;"></div><span class="label">10:10</span></div>
            <div class="bar-group"><span class="count">5</span><div class="bar" style="height: 9%; background-color: #4CAF50;"></div><span class="label">10:20</span></div>
            <div class="bar-group"><span class="count">14</span><div class="bar" style="height: 100%; background-color: #e91e63;"></div><span class="label">10:30</span></div>
            <div class="bar-group"><span class="count">5</span><div class="bar" style="height: 36%; background-color: #4CAF50;"></div><span class="label">10:40</span></div>
            <div class="bar-group"><span class="count">3</span><div class="bar" style="height: 63%; background-color: #4CAF50;"></div><span class="label">10:50</span></div>
            <div class="bar-group"><span class="count">3</span><div class="bar" style="height: 36%; background-color: #4CAF50;"></div><span class="label">11:00</span></div>
            <div class="bar-group"><span class="count">1</span><div class="bar" style="height: 9%; background-color: #4CAF50;"></div><span class="label">11:20</span></div>
            <div class="bar-group"><span class="count">1</span><div class="bar" style="height: 9%; background-color: #4CAF50;"></div><span class="label">11:30</span></div>
        </div>
        
        <p class="chart-legend">On constate un pic d'activité photographique à partir de 10h30.</p>
    </div>

</body>
